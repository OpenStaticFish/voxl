server {
    listen      80;
    listen      [::]:80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    gzip            on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # Single-page-app fallback: serve the file if present, else index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted assets (Vite/Astro emit content-hashed names) — cache hard.
    location ~* \.(?:js|css|woff2?|wasm|png|jpe?g|gif|svg|ico|webp)$ {
        expires     30d;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }
}
